name: Find Deno Deploy Preview URL

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  find-preview:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for deployment
        run: sleep 30

      - name: Query deployments
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== All deployments (last 10) ==="
          gh api repos/${{ github.repository }}/deployments --jq '.[0:10]' | head -80

          echo ""
          echo "=== Commit statuses ==="
          gh api repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }} \
            --jq '.[] | {state, target_url, context, description}' | head -40

          echo ""
          echo "=== Combined status ==="
          gh api repos/${{ github.repository }}/commits/${{ github.event.pull_request.head.sha }}/status \
            --jq '{state, total_count, statuses: [.statuses[] | {context, target_url, state}]}' | head -40

          echo ""
          echo "=== Check runs ==="
          gh api repos/${{ github.repository }}/commits/${{ github.event.pull_request.head.sha }}/check-runs \
            --jq '.check_runs[] | {name, status, conclusion, details_url, html_url}' | head -40

          echo ""
          echo "=== Environments ==="
          gh api repos/${{ github.repository }}/environments --jq '.environments[] | {name, html_url}' 2>/dev/null | head -20

          echo ""
          echo "=== Predicted branch URL ==="
          SLUG=$(echo "${{ github.head_ref }}" | tr '/' '-' | tr '[:upper:]' '[:lower:]')
          echo "https://marlinspike--${SLUG}.sordina.deno.net"
